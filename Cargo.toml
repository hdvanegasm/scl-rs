[package]
name = "scl-rs"
version = "0.1.0"
edition = "2021"
authors = ["hdvanegasm"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
thiserror = "2.0.12"
rand = "0.10"
log = "0.4.29"
rustls = "0.23.26"
serde_json = "1"
bincode = { version = "2", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
async-trait = "0.1"
crypto-bigint = { version = "0.7", features = ["serde"] }
tokio = { version = "1", features = ["full"] }
